  # Run tests on changed modules
  test-modules:
    name: Test singularity
    # needs: [detect-changes, prepare-modules]
    # if: needs.detect-changes.outputs.modules != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [ modules/gianglabs/fastp/trim ] # ${{ fromJson(needs.prepare-modules.outputs.matrix) }}
        profile: [ singularity ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0

      - name: Cache Nextflow
        uses: actions/cache@v4
        with:
          path: ~/.nextflow
          key: ${{ runner.os }}-nextflow-${{ env.NXF_VER }}

      - name: Run nf-test on module
        env:
          NFT_WORKDIR: ${{ github.workspace }}/work
        run: |
          echo "=========================================="
          echo " Testing module: ${{ matrix.module }}"
          echo "=========================================="
          if [ -d "${{ matrix.module }}/tests" ]; then
            export NFT_WORKDIR=${pwd}
            # install singulariy if needed
            if [[ ${{ matrix.profile }} == "singularity" ]]; then
              sudo apt update
              sudo apt install -y software-properties-common
              sudo add-apt-repository -y ppa:apptainer/ppa
              sudo apt update
              sudo apt install -y apptainer apptainer-suid
              mkdir -p $NXF_SINGULARITY_CACHEDIR
              mkdir -p $NXF_SINGULARITY_LIBRARYDIR
            fi
            pixi run nf-test test ${{ matrix.module }}/tests/ --profile ${{ matrix.profile }} --verbose --ci
          else
            echo "⚠️  No tests found for ${{ matrix.module }}"
          fi

