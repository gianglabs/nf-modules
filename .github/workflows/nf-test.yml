name: nf-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel if a newer run is started
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NFT_VER: "0.9.3"
  NXF_ANSI_LOG: false
  NXF_SINGULARITY_CACHEDIR: ${{ github.workspace }}/.singularity
  NXF_SINGULARITY_LIBRARYDIR: ${{ github.workspace }}/.singularity
  NXF_VER: "25.04.8"

jobs:
  # Detect which modules and subworkflows have changed
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changed-modules.outputs.all_changed_files }}
      subworkflows: ${{ steps.changed-subworkflows.outputs.all_changed_files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed modules
        uses: tj-actions/changed-files@v46.0.5
        id: changed-modules
        with:
          dir_names: "true"
          dir_names_max_depth: 3
          files: modules/gianglabs/**
          base: ${{ github.event.pull_request.base.ref || 'origin/main' }}

      - name: Get changed subworkflows
        uses: tj-actions/changed-files@v46.0.5
        id: changed-subworkflows
        with:
          dir_names: "true"
          dir_names_max_depth: 3
          files: subworkflows/gianglabs/**
          base: ${{ github.event.pull_request.base.ref || 'origin/main' }}

      - name: Debug - Show detected changes
        run: |
          echo "=========================================="
          echo "📦 Changed modules: ${{ steps.changed-modules.outputs.all_changed_files }}"
          echo "🔧 Changed subworkflows: ${{ steps.changed-subworkflows.outputs.all_changed_files }}"
          echo "=========================================="

  # Run tests on changed modules
  test-modules:
    name: Test modules
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [docker, singularity]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0

      - name: Cache Nextflow
        uses: actions/cache@v4
        with:
          path: ~/.nextflow
          key: ${{ runner.os }}-nextflow-${{ env.NXF_VER }}

      - name: Run nf-test on modules
        run: |
          echo "=========================================="
          echo " Testing modules with profile: ${{ matrix.profile }}"
          echo " Matrix modules: ${{ needs.detect-changes.outputs.modules }}"
          echo "=========================================="
          for module in ${{ needs.detect-changes.outputs.modules }}; do
            echo " Testing module: $module"
            NFT_WORKDIR=~
            # install singulariy if needed
            if [[ ${{ matrix.profile }} == "singularity" ]]; then
              sudo apt update
              sudo apt install -y software-properties-common
              sudo add-apt-repository -y ppa:apptainer/ppa
              sudo apt update
              sudo apt install -y apptainer apptainer-suid
              mkdir -p $NXF_SINGULARITY_CACHEDIR
              mkdir -p $NXF_SINGULARITY_LIBRARYDIR
            fi
            pixi run nf-test test $module/tests/ --profile ${{ matrix.profile }} --verbose --ci
          done

  # Run tests on changed subworkflows
  test-subworkflows:
    name: Test subworkflows
    needs: detect-changes
    if: needs.detect-changes.outputs.subworkflows != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [docker, singularity]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0

      - name: Cache Nextflow
        uses: actions/cache@v4
        with:
          path: ~/.nextflow
          key: ${{ runner.os }}-nextflow-${{ env.NXF_VER }}

      - name: Run nf-test on subworkflows
        run: |
          echo "=========================================="
          echo " Testing subworkflows with profile: ${{ matrix.profile }}"
          echo " Matrix subworkflows: ${{ needs.detect-changes.outputs.subworkflows }}"
          echo "=========================================="
          for subworkflow in ${{ needs.detect-changes.outputs.subworkflows }}; do
            echo " Testing subworkflow: $subworkflow"
            pixi run nf-test test $subworkflow/tests/ -p ${{ matrix.profile }}
          done

  # Confirm all tests passed
  confirm-pass:
    name: Confirm all tests passed
    runs-on: ubuntu-latest
    needs: [detect-changes, test-modules, test-subworkflows]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.detect-changes.result }}" != "success" ]]; then
            echo "❌ Detect changes job failed"
            exit 1
          fi
          
          if [[ "${{ needs.test-modules.result }}" == "failure" ]]; then
            echo "❌ Module tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.test-subworkflows.result }}" == "failure" ]]; then
            echo "❌ Subworkflow tests failed"
            exit 1
          fi
          
          echo "✅ All tests passed"
