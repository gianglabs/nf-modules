name: Detect changed components

on:
  workflow_call:
    outputs:
      modules:
        description: "Space-separated list of changed modules"
        value: ${{ jobs.detect-changes.outputs.modules }}
      subworkflows:
        description: "Space-separated list of changed subworkflows"
        value: ${{ jobs.detect-changes.outputs.subworkflows }}

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changed-modules.outputs.all_changed_files }}
      subworkflows: ${{ steps.changed-subworkflows.outputs.all_changed_files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed modules
        id: changed-modules
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'origin/main' }}"
          # For local testing with act, use main if origin/main doesn't exist
          if ! git rev-parse --verify $BASE_REF >/dev/null 2>&1; then
            BASE_REF="main"
          fi
          
          echo "Comparing against: $BASE_REF"
          CHANGED_MODULES=$(git diff --name-only $BASE_REF... -- modules/gianglabs/ | cut -d/ -f1-3 | sort -u | tr '\n' ' ' || echo "")
          echo "all_changed_files=$CHANGED_MODULES" >> $GITHUB_OUTPUT
          echo "Changed modules: $CHANGED_MODULES"

      - name: Get changed subworkflows
        id: changed-subworkflows
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'origin/main' }}"
          # For local testing with act, use main if origin/main doesn't exist
          if ! git rev-parse --verify $BASE_REF >/dev/null 2>&1; then
            BASE_REF="main"
          fi
          
          echo "Comparing against: $BASE_REF"
          CHANGED_SUBWORKFLOWS=$(git diff --name-only $BASE_REF... -- subworkflows/gianglabs/ | cut -d/ -f1-3 | sort -u | tr '\n' ' ' || echo "")
          echo "all_changed_files=$CHANGED_SUBWORKFLOWS" >> $GITHUB_OUTPUT
          echo "Changed subworkflows: $CHANGED_SUBWORKFLOWS"

      - name: Debug - Show detected changes
        run: |
          echo "=========================================="
          echo "📦 Changed modules: ${{ steps.changed-modules.outputs.all_changed_files }}"
          echo "🔧 Changed subworkflows: ${{ steps.changed-subworkflows.outputs.all_changed_files }}"
          echo "=========================================="
